display_information:
  name: Caleb Gregory's Slack App
oauth_config:
  scopes:
    user:
      # --- Lists API ---
      - lists:read   # read list contents and schema (slackLists.items.list)
      - lists:write  # create/update/delete list items (slackLists.items.create, etc.)

      # --- Canvases API ---
      - canvases:read   # read canvas content (canvases.access.set, content fetch)
      - canvases:write  # create / edit / delete canvases (canvases.create, canvases.edit)

      # --- Files (lists are stored as files internally) ---
      - files:read  # list discovery (files.list types=lists) and schema fetching (files.info)

      # --- Users (resolve assignees, posters, mentions to/from human-friendly identifiers) ---
      - users:read         # users.info, users.list — id ↔ name/profile resolution and local caching
      - users:read.email   # users.lookupByEmail — accept email as input for assignee fields
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
  is_mcp_enabled: false
