computer_name = ''

[claude.project-targets]
vault-main = "~/_/main"
work-org = ""

# Optional: override the path used to derive the auto-memory key for a project.
# Defaults to the project target above. Set this when Claude Code's auto-memory
# key was derived from an ancestor of the target (e.g. target=~/work/notes/personal-work
# but auto-memory lives at ~/.claude/projects/-Users-<you>-work-notes/memory).
[claude.auto-memory-paths]
# work-org = "~/work/notes"

[vault]
walked-file = "~/_/main/walked.md"
